name: Fetch Weather Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # リポジトリ取得
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # フォルダ作成
      # =========================
      - name: Create directories
        run: |
          mkdir -p data/nara
          mkdir -p data/wakayama

      # =========================
      # 奈良
      # =========================
      - name: Fetch Nara Weather
        run: |
          curl -f -s https://www.jma.go.jp/bosai/forecast/data/forecast/290000.json \
          -o data/nara/weather.json

      - name: Fetch Nara Overview
        run: |
          curl -f -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/290000.json \
          -o data/nara/overview.json

      - name: Fetch Nara Comment（Shift_JIS → UTF-8）
        run: |
          echo "Fetching Nara comment..."
          curl -f -s https://www.jma.go.jp/bosai/forecaster_comment/data/comments/290000.txt -o raw.txt

          if [ ! -s raw.txt ]; then
            echo "Download failed!"
            exit 1
          fi

          iconv -f SHIFT_JIS -t UTF-8 raw.txt > data/nara/comment.txt
          rm raw.txt

      # =========================
      # 和歌山
      # =========================
      - name: Fetch Wakayama Weather
        run: |
          curl -f -s https://www.jma.go.jp/bosai/forecast/data/forecast/300000.json \
          -o data/wakayama/weather.json

      - name: Fetch Wakayama Overview
        run: |
          curl -f -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/300000.json \
          -o data/wakayama/overview.json

      - name: Fetch Wakayama Comment（Shift_JIS → UTF-8）
        run: |
          echo "Fetching Wakayama comment..."
          curl -f -s https://www.jma.go.jp/bosai/forecaster_comment/data/comments/300000.txt -o raw.txt

          if [ ! -s raw.txt ]; then
            echo "Download failed!"
            exit 1
          fi

          iconv -f SHIFT_JIS -t UTF-8 raw.txt > data/wakayama/comment.txt
          rm raw.txt

      # =========================
      # コミット＆プッシュ
      # =========================
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "update weather data"
          git push
