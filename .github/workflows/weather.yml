name: Fetch Weather Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all regions
        run: |
          python3 - <<'PY'
          import json
          import re
          import html
          import urllib.request
          from pathlib import Path
          from html.parser import HTMLParser

          regions = [
              {"folder": "shiga", "code": "250000", "name": "滋賀県"},
              {"folder": "kyoto", "code": "260000", "name": "京都府"},
              {"folder": "osaka", "code": "270000", "name": "大阪府"},
              {"folder": "hyogo", "code": "280000", "name": "兵庫県"},
              {"folder": "nara", "code": "290000", "name": "奈良県"},
              {"folder": "wakayama", "code": "300000", "name": "和歌山県"},
          ]

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          def fetch_bytes(url: str) -> bytes:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as res:
                  return res.read()

          def fetch_json(url: str):
              data = fetch_bytes(url)
              return json.loads(data.decode("utf-8"))

          class CommentLinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self._current_href = None
                  self._current_text = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "a":
                      attr_map = dict(attrs)
                      self._current_href = attr_map.get("href")
                      self._current_text = []

              def handle_data(self, data):
                  if self._current_href is not None:
                      self._current_text.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "a" and self._current_href:
                      text = "".join(self._current_text).strip()
                      href = self._current_href.strip()
                      if text and href:
                          self.links.append({"label": text, "url": href})
                      self._current_href = None
                      self._current_text = []

          def parse_comment(raw: bytes):
              text = None
              for enc in ["cp932", "shift_jis", "utf-8", "euc_jp"]:
                  try:
                      text = raw.decode(enc)
                      break
                  except UnicodeDecodeError:
                      pass

              if text is None:
                  text = raw.decode("cp932", errors="replace")

              text = text.replace("\r\n", "\n").replace("\r", "\n").strip()

              bgcolor = "#ffffff"
              m = re.search(r'(?is)<body[^>]*bgcolor\s*=\s*["\']?([^"\'>\s]+)', text)
              if m:
                  bgcolor = m.group(1).strip()

              parser = CommentLinkParser()
              parser.feed(text)

              text = re.sub(r'(?i)<br\s*/?>', '\n', text)
              text = re.sub(r'(?i)</p\s*>', '\n', text)
              text = re.sub(r'(?i)</div\s*>', '\n', text)
              text = re.sub(r'(?i)</li\s*>', '\n', text)

              text = re.sub(r'(?is)<script.*?>.*?</script>', '', text)
              text = re.sub(r'(?is)<style.*?>.*?</style>', '', text)
              text = re.sub(r'(?is)<[^>]+>', '', text)
              text = html.unescape(text)

              lines = []
              for line in text.split("\n"):
                  s = line.rstrip()
                  if not s.strip():
                      lines.append("")
                      continue
                  if s.lstrip().startswith("<") or s.lstrip().startswith("</"):
                      continue
                  if s.lower().startswith("<!doctype"):
                      continue
                  lines.append(s)

              text = "\n".join(lines)
              text = re.sub(r'\n{3,}', '\n\n', text).strip()

              return {
                  "text": text if text else "コメントなし",
                  "bgcolor": bgcolor if bgcolor else "#ffffff",
                  "links": parser.links
              }

          for region in regions:
              folder = Path("data") / region["folder"]
              folder.mkdir(parents=True, exist_ok=True)
              code = region["code"]

              weather_url = f"https://www.jma.go.jp/bosai/forecast/data/forecast/{code}.json"
              overview_url = f"https://www.jma.go.jp/bosai/forecast/data/overview_forecast/{code}.json"
              comment_url = f"https://www.jma.go.jp/bosai/forecaster_comment/data/comments/{code}.txt"

              try:
                  weather = fetch_json(weather_url)
              except Exception:
                  weather = []

              try:
                  overview = fetch_json(overview_url)
              except Exception:
                  overview = {"text": "天気概況の取得に失敗しました。"}

              try:
                  raw_comment = fetch_bytes(comment_url)
                  comment = parse_comment(raw_comment)
              except Exception:
                  comment = {"text": "コメント取得失敗", "bgcolor": "#ffffff", "links": []}

              (folder / "weather.json").write_text(
                  json.dumps(weather, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )
              (folder / "overview.json").write_text(
                  json.dumps(overview, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )
              (folder / "comment.json").write_text(
                  json.dumps(comment, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )
          PY

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "update weather data $(date '+%Y-%m-%d %H:%M:%S')" || echo "no change"
          git push
