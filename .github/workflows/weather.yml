name: Fetch Weather Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p data/nara
          mkdir -p data/wakayama

      - name: Fetch Nara Weather
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/forecast/290000.json \
            -o data/nara/weather.json

      - name: Fetch Nara Overview
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/290000.json \
            -o data/nara/overview.json

      - name: Fetch Nara Warning
        run: |
          curl -s https://www.jma.go.jp/bosai/warning/data/warning/290000.json \
            -o data/nara/warning.json

      - name: Fetch Nara Comment TXT
        run: |
          curl -s -A "Mozilla/5.0" \
            https://www.jma.go.jp/bosai/forecaster_comment/data/comments/290000.txt \
            -o nara_raw.txt

      - name: Convert Nara Comment to JSON
        run: |
          python3 - <<'PY'
          import json, re, html
          from pathlib import Path

          raw_path = Path("nara_raw.txt")
          out_path = Path("data/nara/comment.json")

          if not raw_path.exists() or raw_path.stat().st_size == 0:
              out_path.write_text(
                  json.dumps({"text": "コメント取得失敗", "bgcolor": "#ffffff"}, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )
              raise SystemExit(0)

          raw = raw_path.read_bytes()

          text = None
          for enc in ["cp932", "shift_jis", "utf-8", "euc_jp"]:
              try:
                  text = raw.decode(enc)
                  break
              except UnicodeDecodeError:
                  pass

          if text is None:
              text = raw.decode("cp932", errors="replace")

          text = text.replace("\r\n", "\n").replace("\r", "\n").strip()

          # body bgcolor の抽出
          bgcolor = "#ffffff"
          m = re.search(r'(?i)<body[^>]*bgcolor\s*=\s*["\']?([^"\'>\s]+)', text)
          if m:
              bgcolor = m.group(1).strip()

          # HTML除去
          text = re.sub(r'(?is)<script.*?>.*?</script>', '', text)
          text = re.sub(r'(?is)<style.*?>.*?</style>', '', text)
          text = re.sub(r'(?is)<[^>]+>', '\n', text)
          text = html.unescape(text)

          lines = []
          for line in text.split("\n"):
              s = line.strip()
              if not s:
                  lines.append("")
                  continue
              if s.startswith("<") or s.startswith("</"):
                  continue
              if s.lower().startswith("<!doctype"):
                  continue
              lines.append(s)

          text = "\n".join(lines)

          stop_markers = [
              "〖主な防災情報のURL/リンク〗",
              "主な防災情報のURL/リンク",
              "背景色などについて",
              "土砂災害警戒情報・警報・注意報",
              "キキクル",
              "雨雲の動き",
              "今後の雨",
              "今後の雪",
          ]
          cut_pos = len(text)
          for marker in stop_markers:
              pos = text.find(marker)
              if pos != -1:
                  cut_pos = min(cut_pos, pos)
          text = text[:cut_pos].strip()

          text = re.sub(r'\n{3,}', '\n\n', text).strip()

          out_path.write_text(
              json.dumps({"text": text, "bgcolor": bgcolor}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Fetch Wakayama Weather
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/forecast/300000.json \
            -o data/wakayama/weather.json

      - name: Fetch Wakayama Overview
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/300000.json \
            -o data/wakayama/overview.json

      - name: Fetch Wakayama Warning
        run: |
          curl -s https://www.jma.go.jp/bosai/warning/data/warning/300000.json \
            -o data/wakayama/warning.json

      - name: Fetch Wakayama Comment TXT
        run: |
          curl -s -A "Mozilla/5.0" \
            https://www.jma.go.jp/bosai/forecaster_comment/data/comments/300000.txt \
            -o wakayama_raw.txt

      - name: Convert Wakayama Comment to JSON
        run: |
          python3 - <<'PY'
          import json, re, html
          from pathlib import Path

          raw_path = Path("wakayama_raw.txt")
          out_path = Path("data/wakayama/comment.json")

          if not raw_path.exists() or raw_path.stat().st_size == 0:
              out_path.write_text(
                  json.dumps({"text": "コメント取得失敗", "bgcolor": "#ffffff"}, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )
              raise SystemExit(0)

          raw = raw_path.read_bytes()

          text = None
          for enc in ["cp932", "shift_jis", "utf-8", "euc_jp"]:
              try:
                  text = raw.decode(enc)
                  break
              except UnicodeDecodeError:
                  pass

          if text is None:
              text = raw.decode("cp932", errors="replace")

          text = text.replace("\r\n", "\n").replace("\r", "\n").strip()

          bgcolor = "#ffffff"
          m = re.search(r'(?i)<body[^>]*bgcolor\s*=\s*["\']?([^"\'>\s]+)', text)
          if m:
              bgcolor = m.group(1).strip()

          text = re.sub(r'(?is)<script.*?>.*?</script>', '', text)
          text = re.sub(r'(?is)<style.*?>.*?</style>', '', text)
          text = re.sub(r'(?is)<[^>]+>', '\n', text)
          text = html.unescape(text)

          lines = []
          for line in text.split("\n"):
              s = line.strip()
              if not s:
                  lines.append("")
                  continue
              if s.startswith("<") or s.startswith("</"):
                  continue
              if s.lower().startswith("<!doctype"):
                  continue
              lines.append(s)

          text = "\n".join(lines)

          stop_markers = [
              "〖主な防災情報のURL/リンク〗",
              "主な防災情報のURL/リンク",
              "背景色などについて",
              "土砂災害警戒情報・警報・注意報",
              "キキクル",
              "雨雲の動き",
              "今後の雨",
              "今後の雪",
          ]
          cut_pos = len(text)
          for marker in stop_markers:
              pos = text.find(marker)
              if pos != -1:
                  cut_pos = min(cut_pos, pos)
          text = text[:cut_pos].strip()

          text = re.sub(r'\n{3,}', '\n\n', text).strip()

          out_path.write_text(
              json.dumps({"text": text, "bgcolor": bgcolor}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Cleanup temp files
        run: |
          rm -f nara_raw.txt wakayama_raw.txt

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "update weather data $(date '+%Y-%m-%d %H:%M:%S')" || echo "no change"
          git push
