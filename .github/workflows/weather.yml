name: Fetch Weather Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p data/nara
          mkdir -p data/wakayama

      # 奈良
      - name: Fetch Nara Data
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/forecast/290000.json -o data/nara/weather.json
          curl -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/290000.json -o data/nara/overview.json

      - name: Fetch Nara Comment
        run: |
          echo "奈良コメント取得"

          curl -s -A "Mozilla/5.0" \
          https://www.jma.go.jp/bosai/forecaster_comment/data/comments/290000.txt \
          -o raw.txt

          if [ -s raw.txt ]; then
            iconv -f SHIFT_JIS -t UTF-8 raw.txt > data/nara/comment.txt
          else
            echo "コメント取得失敗" > data/nara/comment.txt
          fi

          rm -f raw.txt

      # 和歌山
      - name: Fetch Wakayama Data
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/forecast/300000.json -o data/wakayama/weather.json
          curl -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/300000.json -o data/wakayama/overview.json

      - name: Fetch Wakayama Comment
        run: |
          echo "和歌山コメント取得"

          curl -s -A "Mozilla/5.0" \
          https://www.jma.go.jp/bosai/forecaster_comment/data/comments/300000.txt \
          -o raw.txt

          if [ -s raw.txt ]; then
            iconv -f SHIFT_JIS -t UTF-8 raw.txt > data/wakayama/comment.txt
          else
            echo "コメント取得失敗" > data/wakayama/comment.txt
          fi

          rm -f raw.txt

      # Commit
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "update weather data $(date)" || echo "no change"
          git push
