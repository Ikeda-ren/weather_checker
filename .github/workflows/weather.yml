name: Fetch Weather Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p data/nara
          mkdir -p data/wakayama

      - name: Fetch Nara Data
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/forecast/290000.json -o data/nara/weather.json
          curl -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/290000.json -o data/nara/overview.json

      - name: Fetch Nara Comment
        run: |
          curl -s -A "Mozilla/5.0" \
            https://www.jma.go.jp/bosai/forecaster_comment/data/comments/290000.txt \
            -o nara_raw.txt

      - name: Convert Nara Comment to JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          raw = Path("nara_raw.txt").read_bytes()

          text = None
          for enc in ["cp932", "shift_jis", "utf-8", "euc_jp"]:
              try:
                  text = raw.decode(enc)
                  break
              except UnicodeDecodeError:
                  pass

          if text is None:
              text = raw.decode("cp932", errors="replace")

          text = text.replace("\r\n", "\n").replace("\r", "\n").strip()

          Path("data/nara/comment.json").write_text(
              json.dumps({"text": text}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Fetch Wakayama Data
        run: |
          curl -s https://www.jma.go.jp/bosai/forecast/data/forecast/300000.json -o data/wakayama/weather.json
          curl -s https://www.jma.go.jp/bosai/forecast/data/overview_forecast/300000.json -o data/wakayama/overview.json

      - name: Fetch Wakayama Comment
        run: |
          curl -s -A "Mozilla/5.0" \
            https://www.jma.go.jp/bosai/forecaster_comment/data/comments/300000.txt \
            -o wakayama_raw.txt

      - name: Convert Wakayama Comment to JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          raw = Path("wakayama_raw.txt").read_bytes()

          text = None
          for enc in ["cp932", "shift_jis", "utf-8", "euc_jp"]:
              try:
                  text = raw.decode(enc)
                  break
              except UnicodeDecodeError:
                  pass

          if text is None:
              text = raw.decode("cp932", errors="replace")

          text = text.replace("\r\n", "\n").replace("\r", "\n").strip()

          Path("data/wakayama/comment.json").write_text(
              json.dumps({"text": text}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Cleanup temp files
        run: |
          rm -f nara_raw.txt wakayama_raw.txt

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "update weather data $(date)" || echo "no change"
          git push
