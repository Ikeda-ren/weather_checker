<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気ダッシュボード Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>天気ダッシュボード Pro</h1>
    <div id="status">読み込み中...</div>

    <div class="toolbar">
      <select id="leftSelect"></select>
      <select id="rightSelect"></select>
      <button type="button" id="applySelectionBtn">選択した府県で表示</button>
      <button type="button" id="swapBtn">左右入れ替え</button>
      <button type="button" id="darkModeBtn">ダークモード切替</button>
      <button type="button" id="refreshBtn">今すぐ更新</button>
    </div>
  </header>

  <main class="page" id="pageRoot">
    <div class="mode-buttons" id="modeButtons"></div>
    <div class="pair-buttons" id="pairButtons"></div>
    <div class="grid" id="areas"></div>
    <div class="footer-note">
      データ取得元：気象庁公開データ / GitHub Pages
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
