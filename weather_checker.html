<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気ダッシュボード</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", "Yu Gothic", sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: #333;
}

/* ヘッダー */
header {
  text-align: center;
  padding: 1.5rem;
  color: white;
}

#status {
  font-size: 0.9rem;
  opacity: 0.8;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 1rem;
  padding: 1rem;
}

/* カード */
.card {
  background: white;
  border-radius: 16px;
  padding: 1rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* 見出し */
h2 {
  margin: 0 0 0.5rem;
}

/* 更新時刻 */
.time {
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 0.5rem;
}

/* セクション */
.section {
  margin-top: 1rem;
}

.section h3 {
  margin-bottom: 0.3rem;
  border-left: 4px solid #4facfe;
  padding-left: 6px;
}

/* テキスト */
.text {
  background: #f1f5ff;
  padding: 0.5rem;
  border-radius: 8px;
  white-space: pre-wrap;
  font-size: 0.9rem;
}

/* テーブル */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

th, td {
  padding: 5px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #f0f4ff;
}

/* 今日 */
.today {
  background: #ffe082 !important;
}

/* 警報 */
.alert {
  background: #ffebee;
  border-left: 6px solid red;
}
</style>
</head>

<body>

<header>
  <h1>天気ダッシュボード</h1>
  <div id="status">読み込み中...</div>
</header>

<div class="grid" id="areas"></div>

<script>
const regions = [
  { code: "290000", name: "奈良県", path: "data/nara" },
  { code: "300000", name: "和歌山県", path: "data/wakayama" }
];

function createCard(r){
  const el = document.createElement("div");
  el.className = "card";
  el.id = "card-" + r.code;

  el.innerHTML = `
    <h2>${r.name}</h2>
    <div class="time" id="time-${r.code}"></div>

    <div class="section">
      <h3>天気予報</h3>
      <div id="forecast-${r.code}"></div>
    </div>

    <div class="section">
      <h3>天気概況</h3>
      <div id="overview-${r.code}" class="text"></div>
    </div>

    <div class="section">
      <h3>気象警報</h3>
      <div id="comment-${r.code}" class="text"></div>
    </div>
  `;
  return el;
}

function renderForecast(code, data){
  const el = document.getElementById("forecast-" + code);

  if (!data || !data[0]) {
    el.innerHTML = "データなし";
    return;
  }

  const ts = data[0].timeSeries[0];
  if (!ts) {
    el.innerHTML = "データなし";
    return;
  }

  let html = "<table><tr><th>日付</th>";

  ts.timeDefines.forEach(d=>{
    const date = new Date(d);
    html += `<th>${date.getMonth()+1}/${date.getDate()}</th>`;
  });

  html += "</tr>";

  ts.areas.forEach(a=>{
    html += `<tr><th>${a.area.name}</th>`;
    a.weathers.forEach(w=>{
      html += `<td>${w}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  el.innerHTML = html;
}

function renderOverview(code, data){
  document.getElementById("overview-" + code).textContent = data.text || "なし";

  if(data.reportDatetime){
    document.getElementById("time-" + code).textContent =
      "更新: " + new Date(data.reportDatetime).toLocaleString();
  }
}

function renderComment(code, data){
  const el = document.getElementById("comment-" + code);
  const card = document.getElementById("card-" + code);

  if (!data || !data.areas) {
    el.textContent = "なし";
    return;
  }

  let text = "";

  data.areas.forEach(area => {
    const warnings = area.warnings
      .filter(w => w.status !== "なし")
      .map(w => w.name);

    if (warnings.length > 0) {
      text += `${area.area.name}: ${warnings.join(", ")}\n`;
    }
  });

  el.textContent = text || "なし";

  // 警報があれば赤く
  if (text) {
    card.classList.add("alert");
  }
}

async function fetchRegion(r){
  try{
    const [f,o,c] = await Promise.all([
      fetch(`${r.path}/weather.json`).then(res=>res.json()),
      fetch(`${r.path}/overview.json`).then(res=>res.json()),
      fetch(`${r.path}/comment.json`).then(res=>res.json())
    ]);

    renderForecast(r.code, f);
    renderOverview(r.code, o);
    renderComment(r.code, c);

  }catch(e){
    console.error(e);
  }
}

async function init(){
  const areas = document.getElementById("areas");
  areas.innerHTML = "";

  regions.forEach(r=>{
    areas.appendChild(createCard(r));
  });

  await Promise.all(regions.map(fetchRegion));

  document.getElementById("status").textContent =
    "最終更新: " + new Date().toLocaleTimeString();
}

setInterval(init, 300000);
window.onload = init;
</script>

</body>
</html>
