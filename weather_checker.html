<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気ダッシュボード Pro</title>

<style>
:root {
  --bg: linear-gradient(135deg, #4facfe, #00f2fe);
  --card: #fff;
  --text: #333;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2c2c2c;
  --text: #eee;
}

body {
  margin: 0;
  font-family: "Segoe UI", "Yu Gothic", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ヘッダー */
header {
  position: sticky;
  top: 0;
  text-align: center;
  padding: 1rem;
  background: rgba(0,0,0,0.2);
  color: white;
  backdrop-filter: blur(10px);
}

button {
  margin-top: 5px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 1rem;
  padding: 1rem;
}

/* カード */
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 1rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* セクション */
.section {
  margin-top: 1rem;
}

.text {
  background: rgba(0,0,0,0.05);
  padding: 0.5rem;
  border-radius: 8px;
  white-space: pre-wrap;
}

/* テーブル */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

th, td {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}

.today { background: #ffe082; }
.tomorrow { background: #bbdefb; }

/* 警報 */
.alert-high { border-left: 6px solid red; }
.alert-mid { border-left: 6px solid orange; }
</style>
</head>

<body>

<header>
  <h1>天気ダッシュボード Pro</h1>
  <div id="status">読み込み中...</div>
  <button onclick="toggleDark()">ダークモード</button>
</header>

<div class="grid" id="areas"></div>

<script>
const regions = [
  { code: "290000", name: "奈良県", path: "data/nara" },
  { code: "300000", name: "和歌山県", path: "data/wakayama" }
];

// 🌤 アイコン
function icon(w){
  if (w.includes("晴")) return "☀️";
  if (w.includes("曇")) return "☁️";
  if (w.includes("雨")) return "🌧";
  if (w.includes("雪")) return "❄️";
  return "🌈";
}

// UI
function createCard(r){
  const el = document.createElement("div");
  el.className = "card";
  el.id = "card-" + r.code;

  el.innerHTML = `
    <h2>${r.name}</h2>
    <div id="time-${r.code}"></div>

    <div class="section">
      <h3>天気予報</h3>
      <div id="forecast-${r.code}"></div>
    </div>

    <div class="section">
      <h3>概況</h3>
      <div id="overview-${r.code}" class="text"></div>
    </div>

    <div class="section">
      <h3>警報</h3>
      <div id="comment-${r.code}" class="text"></div>
    </div>
  `;
  return el;
}

// 予報
function renderForecast(code, data){
  const el = document.getElementById("forecast-"+code);
  const ts = data[0].timeSeries[0];

  const today = new Date();
  const tomorrow = new Date();
  tomorrow.setDate(today.getDate()+1);

  let html = "<table><tr><th>日付</th>";

  ts.timeDefines.forEach(d=>{
    const date = new Date(d);
    let cls="";
    if(date.toDateString()===today.toDateString()) cls="today";
    if(date.toDateString()===tomorrow.toDateString()) cls="tomorrow";

    html += `<th class="${cls}">${date.getMonth()+1}/${date.getDate()}</th>`;
  });

  html+="</tr>";

  ts.areas.forEach(a=>{
    html += `<tr><th>${a.area.name}</th>`;
    a.weathers.forEach(w=>{
      html += `<td>${icon(w)}<br>${w}</td>`;
    });
    html += "</tr>";
  });

  html+="</table>";
  el.innerHTML = html;
}

// 概況
function renderOverview(code, data){
  document.getElementById("overview-"+code).textContent = data.text || "なし";

  if(data.reportDatetime){
    document.getElementById("time-"+code).textContent =
      "更新: " + new Date(data.reportDatetime).toLocaleString();
  }
}

// 警報
function renderComment(code, data){
  const el = document.getElementById("comment-"+code);
  const card = document.getElementById("card-"+code);

  if (!data || !data[0]) return;

  let text="";

  data[0].areas.forEach(a=>{
    const list = a.warnings
      .filter(w=>w.status!=="なし")
      .map(w=>w.name);

    if(list.length){
      text += `${a.area.name}: ${list.join(", ")}\n`;
    }
  });

  el.textContent = text || "なし";

  if(text.includes("警報")){
    card.classList.add("alert-high");
  } else if(text.includes("注意報")){
    card.classList.add("alert-mid");
  }
}

// 取得
async function fetchRegion(r){
  try{
    const [f,o,c] = await Promise.all([
      fetch(`${r.path}/weather.json`).then(r=>r.json()),
      fetch(`${r.path}/overview.json`).then(r=>r.json()),
      fetch(`${r.path}/comment.json`).then(r=>r.json())
    ]);

    renderForecast(r.code,f);
    renderOverview(r.code,o);
    renderComment(r.code,c);

  }catch(e){
    console.error(e);
    document.getElementById("status").textContent="取得失敗";
  }
}

// 初期化
async function init(){
  document.getElementById("status").textContent="更新中...";
  const areas = document.getElementById("areas");
  areas.innerHTML="";

  regions.forEach(r=>areas.appendChild(createCard(r)));

  await Promise.all(regions.map(fetchRegion));

  document.getElementById("status").textContent =
    "最終更新: "+new Date().toLocaleTimeString();
}

setInterval(init,300000);
window.onload=init;

// ダークモード
function toggleDark(){
  document.body.classList.toggle("dark");
}

// PWA（簡易）
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
