<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気ダッシュボード Pro</title>

  <style>
    :root {
      --bg: linear-gradient(135deg, #dfefff 0%, #eef7ff 100%);
      --card: #ffffff;
      --card-sub: #ffffff;
      --text: #222;
      --muted: #666;
      --line: #cfd8e3;
      --head-bg: #f1f5f9;
      --accent: #2563eb;
      --today: #fff2b8;
      --tomorrow: #dcecff;
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    body.dark {
      --bg: linear-gradient(135deg, #0f172a, #1e293b);
      --card: #1f2937;
      --card-sub: #111827;
      --text: #f3f4f6;
      --muted: #cbd5e1;
      --line: #334155;
      --head-bg: #253244;
      --accent: #60a5fa;
      --today: #6b5700;
      --tomorrow: #1d4ed8;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 18px;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
      font-weight: 700;
    }

    #status {
      font-size: 0.9rem;
      opacity: 0.95;
    }

    .toolbar {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .toolbar button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      background: white;
      color: #1f2937;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px;
    }

    /* 横幅が十分なら2列、狭ければ1列 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(620px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.12);
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .time {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .section {
      margin-top: 16px;
    }

    .section h3 {
      margin: 0 0 8px;
      padding-left: 10px;
      border-left: 4px solid var(--accent);
      font-size: 1rem;
    }

    .panel {
      background: var(--card-sub);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .comment-panel {
      transition: background-color .2s ease;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card-sub);
    }

    /* 気象庁っぽいシンプル表 */
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      font-size: 0.9rem;
      table-layout: fixed;
    }

    th, td {
      padding: 8px 6px;
      border: 1px solid var(--line);
      text-align: center;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      background: var(--head-bg);
      font-weight: 700;
    }

    .region-head {
      width: 92px;
    }

    .today {
      background: var(--today) !important;
    }

    .tomorrow {
      background: var(--tomorrow) !important;
      color: inherit;
    }

    .weather-cell {
      line-height: 1.5;
      font-size: 0.88rem;
    }

    .weather-icon {
      display: inline-block;
      font-size: 1.25rem;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: #b91c1c;
      font-weight: 700;
    }

    .sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: white;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.35rem;
      }

      .page {
        padding: 12px;
      }

      .card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>天気ダッシュボード Pro</h1>
    <div id="status">読み込み中...</div>
    <div class="toolbar">
      <button type="button" onclick="toggleDarkMode()">ダークモード切替</button>
      <button type="button" onclick="init()">今すぐ更新</button>
    </div>
  </header>

  <main class="page">
    <div class="grid" id="areas"></div>
    <div class="footer-note">
      データ取得元：気象庁公開データ / GitHub Pages
    </div>
  </main>

  <script>
    const regions = [
      { code: "290000", name: "奈良県", path: "data/nara" },
      { code: "300000", name: "和歌山県", path: "data/wakayama" }
    ];

    function weatherIcon(text) {
      if (!text) return "🌈";
      if (text.includes("晴")) return "☀";
      if (text.includes("曇")) return "☁";
      if (text.includes("雨")) return "☔";
      if (text.includes("雪")) return "❄";
      if (text.includes("雷")) return "⚡";
      return "○";
    }

    function createCard(region) {
      const el = document.createElement("div");
      el.className = "card";
      el.id = `card-${region.code}`;

      el.innerHTML = `
        <h2>${region.name}</h2>
        <div class="time" id="time-${region.code}">更新時刻: -</div>

        <section class="section">
          <h3>天気予報</h3>
          <div id="forecast-${region.code}" class="table-wrap">
            <div class="panel muted">読み込み中...</div>
          </div>
        </section>

        <section class="section">
          <h3>天気概況</h3>
          <div id="overview-${region.code}" class="panel muted">読み込み中...</div>
        </section>

        <section class="section">
          <h3>気象台からのコメント</h3>
          <div id="comment-${region.code}" class="panel comment-panel muted">読み込み中...</div>
        </section>
      `;

      return el;
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${url}`);
      }
      return await res.json();
    }

    function normalizeBgColor(bgcolor) {
      if (!bgcolor) return "";
      const v = String(bgcolor).trim();

      if (/^#[0-9a-fA-F]{3,8}$/.test(v)) return v;
      if (/^[0-9a-fA-F]{6}$/.test(v)) return `#${v}`;
      if (/^[0-9a-fA-F]{3}$/.test(v)) return `#${v}`;

      return v;
    }

    function renderForecast(code, data) {
      const el = document.getElementById(`forecast-${code}`);

      if (!Array.isArray(data) || !data[0]?.timeSeries?.[0]) {
        el.innerHTML = `<div class="panel error">天気予報データを読み込めませんでした。</div>`;
        return;
      }

      const ts = data[0].timeSeries[0];
      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(today.getDate() + 1);

      let html = "<table><tr><th class='region-head'>地域</th>";

      ts.timeDefines.forEach(d => {
        const date = new Date(d);
        let cls = "";
        if (date.toDateString() === today.toDateString()) cls = "today";
        else if (date.toDateString() === tomorrow.toDateString()) cls = "tomorrow";

        html += `<th class="${cls}">${date.getMonth() + 1}/${date.getDate()}</th>`;
      });

      html += "</tr>";

      ts.areas.forEach(area => {
        html += `<tr><th class="region-head">${area.area?.name ?? "-"}</th>`;

        const weathers = area.weathers || [];
        const pops = area.pops || [];
        const winds = area.winds || [];

        weathers.forEach((w, i) => {
          const pop = pops[i] ? `降水 ${pops[i]}%` : "";
          const wind = winds[i] || "";

          html += `
            <td class="weather-cell">
              <div class="weather-icon">${weatherIcon(w)}</div>
              <div>${w || "-"}</div>
              ${pop || wind ? `<span class="sub">${pop}${pop && wind ? " / " : ""}${wind}</span>` : ""}
            </td>
          `;
        });

        html += "</tr>";
      });

      html += "</table>";
      el.innerHTML = html;
    }

    function renderOverview(code, data) {
      const el = document.getElementById(`overview-${code}`);
      const timeEl = document.getElementById(`time-${code}`);

      if (!data || typeof data !== "object") {
        el.textContent = "天気概況データを読み込めませんでした。";
        return;
      }

      el.textContent = data.text || "データなし";

      if (data.reportDatetime) {
        timeEl.textContent = "更新時刻: " + new Date(data.reportDatetime).toLocaleString("ja-JP");
      }
    }

    function renderComment(code, data) {
      const el = document.getElementById(`comment-${code}`);

      if (!data || typeof data !== "object") {
        el.textContent = "コメントデータを読み込めませんでした。";
        return;
      }

      el.textContent = data.text || "コメントなし";

      const bg = normalizeBgColor(data.bgcolor);
      if (bg) {
        el.style.backgroundColor = bg;
      }
    }

    async function fetchRegion(region) {
      try {
        const [weather, overview, comment] = await Promise.all([
          fetchJson(`${region.path}/weather.json`),
          fetchJson(`${region.path}/overview.json`),
          fetchJson(`${region.path}/comment.json`)
        ]);

        renderForecast(region.code, weather);
        renderOverview(region.code, overview);
        renderComment(region.code, comment);
      } catch (err) {
        console.error(region.name, err);

        document.getElementById(`forecast-${region.code}`).innerHTML =
          `<div class="panel error">天気予報の取得に失敗しました。</div>`;

        document.getElementById(`overview-${region.code}`).textContent =
          "天気概況の取得に失敗しました。";

        document.getElementById(`comment-${region.code}`).textContent =
          "コメントの取得に失敗しました。";
      }
    }

    async function init() {
      const status = document.getElementById("status");
      const areas = document.getElementById("areas");

      status.textContent = "更新中...";
      areas.innerHTML = "";

      regions.forEach(region => {
        areas.appendChild(createCard(region));
      });

      await Promise.all(regions.map(fetchRegion));

      status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    window.addEventListener("load", init);
    setInterval(init, 300000);
  </script>
</body>
</html>
