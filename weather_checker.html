<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>奈良県 / 和歌山県 天気</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #e0ecff, #f7f9fc);
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 5px;
}

.updated {
  text-align: center;
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}

.container {
  display: flex;
  gap: 20px;
}

.card {
  flex: 1;
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

h2 {
  margin-top: 0;
}

.section {
  margin-top: 15px;
}

.label {
  font-weight: bold;
  border-bottom: 2px solid #4a90e2;
  margin-bottom: 5px;
}

.value {
  margin-top: 5px;
  font-size: 15px;
}

.weather-icon {
  font-size: 24px;
  margin-right: 5px;
}

/* スマホ対応 */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<h1>奈良県 / 和歌山県 天気</h1>
<div class="updated">読み込み中...</div>

<div class="container">

  <!-- 奈良 -->
  <div class="card" id="nara">
    <h2>奈良県</h2>

    <div class="section">
      <div class="label">天気予報</div>
      <div class="value forecast">取得中...</div>
    </div>

    <div class="section">
      <div class="label">天気概況</div>
      <div class="value overview">取得中...</div>
    </div>

    <div class="section">
      <div class="label">気象コメント</div>
      <div class="value comment">取得中...</div>
    </div>
  </div>

  <!-- 和歌山 -->
  <div class="card" id="wakayama">
    <h2>和歌山県</h2>

    <div class="section">
      <div class="label">天気予報</div>
      <div class="value forecast">取得中...</div>
    </div>

    <div class="section">
      <div class="label">天気概況</div>
      <div class="value overview">取得中...</div>
    </div>

    <div class="section">
      <div class="label">気象コメント</div>
      <div class="value comment">取得中...</div>
    </div>
  </div>

</div>

<script>

// 天気アイコン
function getWeatherIcon(text) {
  if (text.includes("晴")) return "☀";
  if (text.includes("曇")) return "☁";
  if (text.includes("雨")) return "☔";
  if (text.includes("雪")) return "❄";
  return "🌈";
}

// データ取得
async function fetchRegion(region) {
  const base = `data/${region}`;

  try {
    const [weather, overview, comment] = await Promise.all([
      fetch(`${base}/weather.json`).then(r => r.json()),
      fetch(`${base}/overview.json`).then(r => r.json()),
      fetch(`${base}/comment.json`).then(r => r.json())
    ]);

    renderForecast(region, weather);
    renderOverview(region, overview);
    renderComment(region, comment);

  } catch (e) {
    console.error("取得エラー:", region, e);
  }
}

// 天気予報
function renderForecast(code, data) {
  if (!data || !data[0]) return;

  const ts = data[0].timeSeries[0];
  const area = ts.areas[0];

  const weather = area.weathers[0];
  const icon = getWeatherIcon(weather);

  document.querySelector(`#${code} .forecast`).innerHTML =
    `<span class="weather-icon">${icon}</span>${weather}`;
}

// 概況
function renderOverview(code, data) {
  document.querySelector(`#${code} .overview`).textContent =
    data.text || "データなし";
}

// コメント
function renderComment(code, data) {
  document.querySelector(`#${code} .comment`).textContent =
    data.text || "データなし";
}

// 更新時間
function updateTime() {
  const now = new Date();
  document.querySelector(".updated").textContent =
    "最終更新: " + now.toLocaleString();
}

// 初期化
async function init() {
  await Promise.all([
    fetchRegion("nara"),
    fetchRegion("wakayama")
  ]);

  updateTime();
}

init();

</script>

</body>
</html>
