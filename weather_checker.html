<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気ダッシュボード Pro</title>

  <style>
    :root {
      --bg: linear-gradient(135deg, #dfefff 0%, #eef7ff 100%);
      --card: #ffffff;
      --card-sub: #ffffff;
      --text: #222;
      --muted: #666;
      --line: #cfd8e3;
      --head-bg: #f1f5f9;
      --accent: #2563eb;
      --today: #fff2b8;
      --tomorrow: #dcecff;
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    body.dark {
      --bg: linear-gradient(135deg, #0f172a, #1e293b);
      --card: #1f2937;
      --card-sub: #111827;
      --text: #f3f4f6;
      --muted: #cbd5e1;
      --line: #334155;
      --head-bg: #253244;
      --accent: #60a5fa;
      --today: #6b5700;
      --tomorrow: #1d4ed8;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 18px;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    #status {
      font-size: 0.9rem;
      opacity: 0.95;
    }

    .toolbar {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, auto));
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .toolbar button,
    .toolbar select {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .toolbar button {
      cursor: pointer;
      background: white;
      color: #1f2937;
    }

    .toolbar select {
      background: white;
      color: #1f2937;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .pair-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .pair-buttons button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      background: rgba(255,255,255,.85);
      color: #1f2937;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .pair-buttons button.active {
      background: #2563eb;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.12);
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .time {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .section {
      margin-top: 16px;
    }

    .section h3 {
      margin: 0 0 8px;
      padding-left: 10px;
      border-left: 4px solid var(--accent);
      font-size: 1rem;
    }

    .panel {
      background: var(--card-sub);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .comment-panel {
      transition: background-color .2s ease;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card-sub);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      font-size: 0.88rem;
      table-layout: fixed;
    }

    th, td {
      padding: 8px 6px;
      border: 1px solid var(--line);
      text-align: center;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      background: var(--head-bg);
      font-weight: 700;
    }

    .region-head {
      width: 92px;
    }

    .today {
      background: var(--today) !important;
    }

    .tomorrow {
      background: var(--tomorrow) !important;
      color: inherit;
    }

    .weather-cell {
      line-height: 1.5;
      font-size: 0.86rem;
    }

    .weather-icon {
      display: inline-block;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: var(--card-sub);
    }

    .mini-box strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(37,99,235,.08);
      border: 1px solid var(--line);
      font-size: 0.8rem;
    }

    .error {
      color: #b91c1c;
      font-weight: 700;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: white;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    @media (max-width: 1400px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      header h1 {
        font-size: 1.3rem;
      }

      .page {
        padding: 12px;
      }

      .card {
        padding: 14px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>天気ダッシュボード Pro</h1>
    <div id="status">読み込み中...</div>

    <div class="toolbar">
      <select id="leftSelect"></select>
      <select id="rightSelect"></select>
      <button type="button" onclick="applyManualSelection()">選択した府県で表示</button>
      <button type="button" onclick="swapRegions()">左右入れ替え</button>
      <button type="button" onclick="toggleDarkMode()">ダークモード切替</button>
      <button type="button" onclick="init()">今すぐ更新</button>
    </div>
  </header>

  <main class="page">
    <div class="pair-buttons" id="pairButtons"></div>
    <div class="grid" id="areas"></div>
    <div class="footer-note">
      データ取得元：気象庁公開データ / GitHub Pages
    </div>
  </main>

  <script>
    const regionMap = {
      shiga: { code: "250000", name: "滋賀県", path: "data/shiga" },
      kyoto: { code: "260000", name: "京都府", path: "data/kyoto" },
      osaka: { code: "270000", name: "大阪府", path: "data/osaka" },
      hyogo: { code: "280000", name: "兵庫県", path: "data/hyogo" },
      nara: { code: "290000", name: "奈良県", path: "data/nara" },
      wakayama: { code: "300000", name: "和歌山県", path: "data/wakayama" }
    };

    const presetPairs = [
      { label: "滋賀・京都", left: "shiga", right: "kyoto" },
      { label: "大阪・兵庫", left: "osaka", right: "hyogo" },
      { label: "奈良・和歌山", left: "nara", right: "wakayama" }
    ];

    let currentLeft = "nara";
    let currentRight = "wakayama";

    function weatherIcon(text) {
      if (!text) return "○";
      if (text.includes("晴")) return "☀";
      if (text.includes("曇")) return "☁";
      if (text.includes("雨")) return "☔";
      if (text.includes("雪")) return "❄";
      if (text.includes("雷")) return "⚡";
      return "○";
    }

    function normalizeBgColor(bgcolor) {
      if (!bgcolor) return "";
      const v = String(bgcolor).trim();
      if (/^#[0-9a-fA-F]{3,8}$/.test(v)) return v;
      if (/^[0-9a-fA-F]{6}$/.test(v)) return `#${v}`;
      if (/^[0-9a-fA-F]{3}$/.test(v)) return `#${v}`;
      return v;
    }

    function populateSelectors() {
      const left = document.getElementById("leftSelect");
      const right = document.getElementById("rightSelect");

      left.innerHTML = "";
      right.innerHTML = "";

      Object.entries(regionMap).forEach(([key, region]) => {
        const opt1 = document.createElement("option");
        opt1.value = key;
        opt1.textContent = region.name;
        left.appendChild(opt1);

        const opt2 = document.createElement("option");
        opt2.value = key;
        opt2.textContent = region.name;
        right.appendChild(opt2);
      });

      left.value = currentLeft;
      right.value = currentRight;
    }

    function renderPairButtons() {
      const wrap = document.getElementById("pairButtons");
      wrap.innerHTML = "";

      presetPairs.forEach(pair => {
        const btn = document.createElement("button");
        btn.textContent = pair.label;
        if (pair.left === currentLeft && pair.right === currentRight) {
          btn.classList.add("active");
        }
        btn.addEventListener("click", () => {
          currentLeft = pair.left;
          currentRight = pair.right;
          populateSelectors();
          renderPairButtons();
          init();
        });
        wrap.appendChild(btn);
      });
    }

    function applyManualSelection() {
      const left = document.getElementById("leftSelect").value;
      const right = document.getElementById("rightSelect").value;
      currentLeft = left;
      currentRight = right;
      renderPairButtons();
      init();
    }

    function swapRegions() {
      const temp = currentLeft;
      currentLeft = currentRight;
      currentRight = temp;
      populateSelectors();
      renderPairButtons();
      init();
    }

    function createCard(region) {
      const el = document.createElement("div");
      el.className = "card";
      el.id = `card-${region.code}`;

      el.innerHTML = `
        <h2>${region.name}</h2>
        <div class="time" id="time-${region.code}">更新時刻: -</div>

        <section class="section">
          <h3>天気予報</h3>
          <div id="forecast-${region.code}" class="table-wrap">
            <div class="panel">読み込み中...</div>
          </div>
          <div id="extras-${region.code}" class="mini-grid"></div>
        </section>

        <section class="section">
          <h3>天気概況</h3>
          <div id="overview-${region.code}" class="panel">読み込み中...</div>
        </section>

        <section class="section">
          <h3>気象台からのコメント</h3>
          <div id="comment-${region.code}" class="panel comment-panel">読み込み中...</div>
        </section>
      `;
      return el;
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${url}`);
      }
      return await res.json();
    }

    function findSeries(data, propName) {
      if (!Array.isArray(data) || !data[0]?.timeSeries) return null;
      return data[0].timeSeries.find(ts =>
        Array.isArray(ts.areas) &&
        ts.areas.some(a => Array.isArray(a[propName]))
      ) || null;
    }

    function findBestArea(areas, regionName) {
      if (!Array.isArray(areas) || areas.length === 0) return null;
      return (
        areas.find(a => a.area?.name === regionName) ||
        areas.find(a => regionName.includes(a.area?.name || "")) ||
        areas[0]
      );
    }

    function renderForecast(code, regionName, data) {
      const el = document.getElementById(`forecast-${code}`);
      const extraEl = document.getElementById(`extras-${code}`);

      if (!Array.isArray(data) || !data[0]?.timeSeries?.[0]) {
        el.innerHTML = `<div class="panel error">天気予報データを読み込めませんでした。</div>`;
        extraEl.innerHTML = "";
        return;
      }

      const weatherSeries = data[0].timeSeries[0];
      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(today.getDate() + 1);

      let html = "<table><tr><th class='region-head'>地域</th>";

      weatherSeries.timeDefines.forEach(d => {
        const date = new Date(d);
        let cls = "";
        if (date.toDateString() === today.toDateString()) cls = "today";
        else if (date.toDateString() === tomorrow.toDateString()) cls = "tomorrow";

        html += `<th class="${cls}">${date.getMonth() + 1}/${date.getDate()}</th>`;
      });

      html += "</tr>";

      weatherSeries.areas.forEach(area => {
        html += `<tr><th class="region-head">${area.area?.name ?? "-"}</th>`;

        const weathers = area.weathers || [];
        const winds = area.winds || [];
        const waves = area.waves || [];

        weathers.forEach((w, i) => {
          const wind = winds[i] || "";
          const wave = waves[i] || "";

          html += `
            <td class="weather-cell">
              <div class="weather-icon">${weatherIcon(w)}</div>
              <div>${w || "-"}</div>
              ${wind ? `<span class="sub">風: ${wind}</span>` : ""}
              ${wave ? `<span class="sub">波: ${wave}</span>` : ""}
            </td>
          `;
        });

        html += "</tr>";
      });

      html += "</table>";
      el.innerHTML = html;

      const boxes = [];

      const popSeries = findSeries(data, "pops");
      if (popSeries) {
        const popArea = findBestArea(popSeries.areas, regionName);
        if (popArea) {
          const chips = (popArea.pops || []).map((v, i) => {
            const time = popSeries.timeDefines?.[i] ? new Date(popSeries.timeDefines[i]) : null;
            const label = time
              ? `${String(time.getMonth() + 1).padStart(2, "0")}/${String(time.getDate()).padStart(2, "0")} ${String(time.getHours()).padStart(2, "0")}時`
              : `時点${i + 1}`;
            return `<span class="chip">${label} ${v || "-"}%</span>`;
          }).join("");

          if (chips) {
            boxes.push(`
              <div class="mini-box">
                <strong>降水確率</strong>
                <div class="chip-list">${chips}</div>
              </div>
            `);
          }
        }
      }

      const tempSeries = findSeries(data, "temps");
      if (tempSeries) {
        const tempArea = findBestArea(tempSeries.areas, regionName);
        if (tempArea) {
          const chips = (tempArea.temps || []).map((v, i) => {
            const time = tempSeries.timeDefines?.[i] ? new Date(tempSeries.timeDefines[i]) : null;
            const label = time
              ? `${String(time.getMonth() + 1).padStart(2, "0")}/${String(time.getDate()).padStart(2, "0")} ${String(time.getHours()).padStart(2, "0")}時`
              : `時点${i + 1}`;
            return `<span class="chip">${label} ${v || "-"}℃</span>`;
          }).join("");

          if (chips) {
            boxes.push(`
              <div class="mini-box">
                <strong>気温</strong>
                <div class="chip-list">${chips}</div>
              </div>
            `);
          }
        }
      }

      extraEl.innerHTML = boxes.join("");
    }

    function renderOverview(code, data) {
      const el = document.getElementById(`overview-${code}`);
      const timeEl = document.getElementById(`time-${code}`);

      if (!data || typeof data !== "object") {
        el.textContent = "天気概況データを読み込めませんでした。";
        return;
      }

      el.textContent = data.text || "データなし";

      if (data.reportDatetime) {
        timeEl.textContent = "更新時刻: " + new Date(data.reportDatetime).toLocaleString("ja-JP");
      }
    }

    function renderComment(code, data) {
      const el = document.getElementById(`comment-${code}`);

      if (!data || typeof data !== "object") {
        el.textContent = "コメントデータを読み込めませんでした。";
        return;
      }

      el.textContent = data.text || "コメントなし";

      const bg = normalizeBgColor(data.bgcolor);
      if (bg) {
        el.style.backgroundColor = bg;
      }
    }

    async function fetchRegion(regionKey) {
      const region = regionMap[regionKey];

      try {
        const [weather, overview, comment] = await Promise.all([
          fetchJson(`${region.path}/weather.json`),
          fetchJson(`${region.path}/overview.json`),
          fetchJson(`${region.path}/comment.json`)
        ]);

        renderForecast(region.code, region.name, weather);
        renderOverview(region.code, overview);
        renderComment(region.code, comment);
      } catch (err) {
        console.error(region.name, err);

        document.getElementById(`forecast-${region.code}`).innerHTML =
          `<div class="panel error">天気予報の取得に失敗しました。</div>`;

        document.getElementById(`extras-${region.code}`).innerHTML = "";

        document.getElementById(`overview-${region.code}`).textContent =
          "天気概況の取得に失敗しました。";

        document.getElementById(`comment-${region.code}`).textContent =
          "コメントの取得に失敗しました。";
      }
    }

    async function init() {
      const status = document.getElementById("status");
      const areas = document.getElementById("areas");

      status.textContent = "更新中...";
      areas.innerHTML = "";

      const leftRegion = regionMap[currentLeft];
      const rightRegion = regionMap[currentRight];

      areas.appendChild(createCard(leftRegion));
      areas.appendChild(createCard(rightRegion));

      await Promise.all([
        fetchRegion(currentLeft),
        fetchRegion(currentRight)
      ]);

      status.textContent = "最終更新: " + new Date().toLocaleString("ja-JP");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    window.addEventListener("load", () => {
      populateSelectors();
      renderPairButtons();
      init();
    });

    setInterval(init, 300000);
  </script>
</body>
</html>
