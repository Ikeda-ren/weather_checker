<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奈良県 / 和歌山県 天気チェック</title>

<style>
body {
  font-family: "Yu Gothic UI", Meiryo, sans-serif;
  margin: 0;
  background: #f5f7fb;
}

.page {
  max-width: 1200px;
  margin: auto;
  padding: 1rem;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 1rem;
  box-shadow: 0 2px 6px rgba(0,0,0,.1);
}

.section {
  margin-top: 1rem;
}

.section h3 {
  border-bottom: 2px solid #4a90e2;
}

.text {
  background: #f8faff;
  padding: 0.5rem;
  border-radius: 6px;
  white-space: pre-wrap;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

#status {
  text-align: center;
  margin-bottom: 1rem;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="page">
  <h1>奈良県 / 和歌山県 天気</h1>
  <div id="status">読み込み中...</div>
  <div class="grid" id="areas"></div>
</div>

<script>
const regions = [
  { code: "290000", name: "奈良県", prefix: "nara" },
  { code: "300000", name: "和歌山県", prefix: "wakayama" }
];

// UI生成
function createCard(region){
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <h2>${region.name}</h2>
    <div id="time-${region.code}"></div>

    <div class="section">
      <h3>天気予報</h3>
      <div id="forecast-${region.code}"></div>
    </div>

    <div class="section">
      <h3>天気概況</h3>
      <div id="overview-${region.code}" class="text"></div>
    </div>

    <div class="section">
      <h3>気象台コメント</h3>
      <div id="comment-${region.code}" class="text"></div>
    </div>
  `;
  return el;
}

// 予報描画
function renderForecast(code, data){
  const el = document.getElementById(`forecast-${code}`);
  if (!data) return el.innerHTML = "データなし";

  const ts = data[0].timeSeries[0];
  const dates = ts.timeDefines;

  let html = "<table><tr><th>日付</th>";
  dates.forEach(d=>{
    const date = new Date(d);
    html += `<th>${date.getMonth()+1}/${date.getDate()}</th>`;
  });
  html += "</tr>";

  ts.areas.forEach(area=>{
    html += `<tr><th>${area.area.name}</th>`;
    area.weathers.forEach(w=>{
      html += `<td>${w}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  el.innerHTML = html;
}

// 概況
function renderOverview(code, data){
  const el = document.getElementById(`overview-${code}`);
  el.textContent = data?.text || "なし";

  const timeEl = document.getElementById(`time-${code}`);
  if(data?.reportDatetime){
    timeEl.textContent = "更新: " + new Date(data.reportDatetime).toLocaleString();
  }
}

// コメント
function renderComment(code, data){
  const el = document.getElementById(`comment-${code}`);
  if (!data) return el.textContent = "なし";

  let text = "";
  if(data.headlineText) text += data.headlineText + "\n";
  if(data.text) text += data.text;

  el.textContent = text || "なし";
}

// データ取得（ローカルJSON）
async function fetchRegion(region){
  try{
    const base = "data/" + region.prefix;

    const [f,o,w] = await Promise.all([
      fetch(base + ".json"),
      fetch(base + "_overview.json"),
      fetch(base + "_warning.json")
    ]);

    const forecast = await f.json();
    const overview = await o.json();
    const warning = await w.json();

    renderForecast(region.code, forecast);
    renderOverview(region.code, overview);
    renderComment(region.code, warning);

  }catch(e){
    console.error(e);
  }
}

// 初期化
async function init(){
  const areas = document.getElementById("areas");

  regions.forEach(r=>{
    areas.appendChild(createCard(r));
  });

  await Promise.all(regions.map(fetchRegion));

  document.getElementById("status").textContent = "更新完了";
}

// 5分ごと更新
setInterval(init, 300000);

window.onload = init;
</script>
</body>
</html>
